# Benchmark scan — manual trigger only. No auto-runs, no MR decoration, no pipeline failures.
# brokencrystals: Crystal/Lucky — most tools have limited or no Crystal support.
# allow_failure: true covers unsupported language scenarios.

appsec-polaris:
  stage: test
  image: ubuntu:22.04
  when: manual
  allow_failure: true
  variables:
    POLARIS_SERVER_URL: $CI_POLARIS_SERVER_URL
    POLARIS_ACCESS_TOKEN: $CI_POLARIS_ACCESS_TOKEN
    DEBIAN_FRONTEND: noninteractive
  script:
    - apt-get update -qq && apt-get install -y -qq curl unzip
    - mkdir -p results/polaris
    - curl -fsSLo polaris.zip "$POLARIS_SERVER_URL/api/tools/polaris_cli-linux64.zip" || true
    - unzip -q polaris.zip || true
    - chmod +x polaris 2>/dev/null || true
    - ./polaris analyze
        --project "brokencrystals-benchmark"
        --output-file results/polaris/polaris-results.json || true
  artifacts:
    when: always
    paths:
      - results/polaris/
    expire_in: 30 days
