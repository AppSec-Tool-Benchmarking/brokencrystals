# Benchmark scan — manual trigger only. No auto-runs, no MR decoration, no pipeline failures.
# brokencrystals: Crystal/Lucky — most tools have limited or no Crystal support.
# Zip source and attempt pipeline scan; allow_failure: true covers unsupported scenarios.

appsec-veracode:
  stage: test
  image: ubuntu:22.04
  when: manual
  allow_failure: true
  variables:
    VERACODE_API_ID: $CI_VERACODE_API_ID
    VERACODE_API_KEY: $CI_VERACODE_API_KEY
    DEBIAN_FRONTEND: noninteractive
  script:
    - apt-get update -qq && apt-get install -y -qq curl unzip default-jre-headless zip
    - mkdir -p results/veracode
    - zip -r results/veracode/source.zip . -x "*.git*" -x "results/*"
    - curl -sLO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
    - unzip -q pipeline-scan-LATEST.zip pipeline-scan.jar
    - java -jar pipeline-scan.jar
        --veracode_api_id "$VERACODE_API_ID"
        --veracode_api_key "$VERACODE_API_KEY"
        --file results/veracode/source.zip
        --fail_on_severity ""
        --json_output_file results/veracode/veracode-results.json || true
  artifacts:
    when: always
    paths:
      - results/veracode/
    expire_in: 30 days
