# Benchmark scan — manual trigger only. No auto-runs, no PR decoration, no pipeline failures.
# Part of the Guidepoint AppSec Tool Benchmarking program (Phase 1).
# Register this file as a separate Azure Pipeline in Azure DevOps.
# NOTE: Crystal/Lucky is not a supported language for Checkmarx SAST.
# The scan will run but is expected to produce empty or error results.

trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    fetchDepth: 0

  - script: mkdir -p results/checkmarx
    displayName: "Create results directory"

  - script: |
      curl -LO https://github.com/Checkmarx/ast-cli/releases/latest/download/ast-cli_linux_x64.tar.gz
      tar -xzf ast-cli_linux_x64.tar.gz
      chmod +x cx
      sudo mv cx /usr/local/bin/cx
    displayName: "Install Checkmarx CLI"

  - script: |
      cx scan create \
        --scan-types sast \
        --project-name "brokencrystals-benchmark" \
        --output-path results/checkmarx/ \
        --output-format sarif \
        --branch master \
        -s . || true
    displayName: "AppSec Benchmark — Checkmarx [brokencrystals]"
    continueOnError: true
    env:
      CX_BASE_URI: $(AZ_CX_BASE_URI)
      CX_TENANT: $(AZ_CX_TENANT)
      CX_CLIENT_ID: $(AZ_CX_CLIENT_ID)
      CX_CLIENT_SECRET: $(AZ_CX_CLIENT_SECRET)

  - task: PublishBuildArtifacts@1
    condition: always()
    inputs:
      pathToPublish: results/checkmarx/
      artifactName: checkmarx-results
