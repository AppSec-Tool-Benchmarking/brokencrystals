# Benchmark scan — manual trigger only. No auto-runs, no PR decoration, no pipeline failures.
# Part of the Guidepoint AppSec Tool Benchmarking program (Phase 1).

name: "AppSec Benchmark — Veracode [brokencrystals]"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  veracode:
    name: Veracode Pipeline Scan
    # brokencrystals uses Crystal/Lucky — Veracode Pipeline Scan does not support Crystal.
    # The scan step will error; continue-on-error ensures the workflow completes and the
    # (empty/error) artifact is still uploaded as valid benchmark data.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create results directory
        run: mkdir -p results/veracode

      - name: Zip source for Veracode
        run: zip -r results/veracode/source.zip . --exclude "*.git*" --exclude "results/*"

      - name: Run Veracode Pipeline Scan
        uses: veracode/Veracode-GitHub-Actions/pipeline-scan@v0.1.0
        continue-on-error: true
        with:
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY }}
          file: "results/veracode/source.zip"
          fail_on_severity: ""
          json_output_file: "results/veracode/veracode-results.json"

      - name: Upload Veracode results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: veracode-results
          path: results/veracode/
          if-no-files-found: warn
